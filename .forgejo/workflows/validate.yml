name: Validate

# Forgejo-native port of .github/workflows/validate.yml (#675, epic homelab#671).
# .forgejo shadows .github (fallback, not union), so all jobs live here now.
# Deltas vs GitHub: fully-qualified uses: URLs; dropped `cache: pip` (no cache
# backend on the self-hosted runner). The GitHub-ecosystem `hacs` and `hassfest`
# jobs are intentionally OMITTED here: hacs/action validates against github.com's
# API view of the repo (401 "not loaded properly in HACS" on Forgejo — it's
# intrinsically GitHub-coupled), and hassfest's workspace-mount convention
# doesn't hold on the self-hosted runner ("No integrations found"). They remain
# in .github/workflows/validate.yml; run them on GitHub only if ever publishing
# this integration to HACS. ruff + pytest are the real gates and run here.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/ -v

  # CI-result alert: Forgejo has no workflow_run/status webhook event, so post to
  # "Homelab GH" on failure. always() + shell gate on upstream results via env
  # context (failure() is unsupported in Forgejo Actions). Secrets = repo Actions.
  notify-failure:
    needs: [lint, test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert on CI failure
        env:
          R1: ${{ needs.lint.result }}
          R2: ${{ needs.test.result }}
          BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "$R1" != failure ] && [ "$R2" != failure ]; then
            echo "validate ok (lint=$R1 test=$R2) — no alert"; exit 0
          fi
          # The runner's GITHUB_SERVER_URL is the internal http://forgejo:3000 —
          # override to the public host so the run link below is externally clickable.
          GITHUB_SERVER_URL="https://forgejo.dragonlance.xyz"
          text="❌ Forgejo CI failed: ${GITHUB_REPOSITORY} / ${GITHUB_WORKFLOW}
          branch ${GITHUB_REF_NAME} @ ${GITHUB_SHA}
          ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_NUMBER}"
          curl -sS -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${text}"
